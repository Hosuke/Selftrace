<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字跡 Selftrace · 碑帖字帖生成器</title>
    <style>
        @font-face { font-family: 'Jiaguwen'; src: url('./fonts/FangzhengJiaguwen.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'ShuowenJiezi'; src: url('./fonts/ShuowenJiezi.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'CaoQuanBei'; src: url('./fonts/CaoQuanBei.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'AoyagiLishu'; src: url('./fonts/AoyagiLishu.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'Qiji'; src: url('./fonts/qiji.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'XuandongKai'; src: url('./fonts/XuandongKaishu.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'MasaFont'; src: url('./fonts/MasaFont-Regular.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'Caoshu'; src: url('./fonts/ZhongqiLiujiangCaoshu.ttf') format('truetype'); font-display: swap; }
        @font-face { font-family: 'Bakudai'; src: url('./fonts/Bakudai-Regular.ttf') format('truetype'); font-display: swap; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f0e8; color: #333; min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1008, #2c1810);
            color: #e8d5b5; padding: 28px 0; text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .header h1 { font-size: 36px; font-weight: 300; letter-spacing: 12px; font-family: 'CaoQuanBei', serif; }
        .header p { font-size: 14px; opacity: 0.6; margin-top: 8px; letter-spacing: 2px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
        .controls {
            background: white; border-radius: 12px; padding: 28px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06); margin-bottom: 24px;
        }
        .controls h2 { font-size: 18px; color: #4a2c20; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .form-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
        .form-group { flex: 1; min-width: 150px; }
        .form-group.wide { flex: 3; min-width: 300px; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
        textarea {
            width: 100%; height: 80px; border: 2px solid #e0d5c5; border-radius: 8px;
            padding: 12px; font-size: 18px; font-family: inherit; resize: vertical;
        }
        textarea:focus { outline: none; border-color: #8b6914; }
        select {
            width: 100%; border: 2px solid #e0d5c5; border-radius: 8px;
            padding: 10px 12px; font-size: 14px; font-family: inherit; background: white;
        }
        select:focus { outline: none; border-color: #8b6914; }
        .btn-row { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 32px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #6b4226, #4a2c20); color: #e8d5b5; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,44,32,0.4); }
        .btn-secondary { background: #f0ebe2; color: #4a2c20; }
        .btn-secondary:hover { background: #e6dfd4; }
        .preview-area {
            background: white; border-radius: 12px; padding: 28px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06); min-height: 300px;
        }
        .preview-area h2 { font-size: 18px; color: #4a2c20; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .preview-container { text-align: center; padding: 20px 0; overflow-x: auto; }
        .preview-container canvas { border: 1px solid #ddd; border-radius: 4px; max-width: 100%; }
        .placeholder { color: #bbb; font-size: 16px; padding: 60px 0; }
        .font-status { font-size: 12px; padding: 8px 16px; border-radius: 6px; margin-bottom: 16px; display: inline-block; }
        .font-loaded { background: #e8f5e9; color: #2e7d32; }
        .font-loading { background: #fff3e0; color: #e65100; }
        .stele-select { margin-top: 8px; }
        .stele-tag {
            display: inline-block; padding: 4px 12px; margin: 4px; border-radius: 20px;
            font-size: 13px; cursor: pointer; border: 1px solid #d0c5b0;
            background: #faf5ec; color: #6b5c3e; transition: all 0.2s;
        }
        .stele-tag:hover, .stele-tag.active { background: #4a2c20; color: #e8d5b5; border-color: #4a2c20; }
        .coverage-info {
            background: #faf5ec; border: 1px solid #e0d5c5; border-radius: 8px;
            padding: 12px 16px; margin-top: 12px; font-size: 13px; color: #6b5c3e; display: none;
        }
        .coverage-info .found { color: #2e7d32; }
        .coverage-info .missing { color: #c62828; }
        .footer { text-align: center; padding: 30px; color: #aaa; font-size: 13px; }

        .stele-badge {
            display: inline-block; padding: 1px 6px; border-radius: 3px;
            font-size: 9px; margin-left: 2px; vertical-align: middle;
        }
        .badge-cqb { background: #e8d5b5; color: #6b4226; }
        .badge-qiji { background: #d5e0e8; color: #2c4a5a; }
        .badge-sw { background: #dde8d5; color: #3a5a2c; }
    </style>
</head>
<body>
    <div class="header">
        <h1>字 跡 Selftrace</h1>
        <p>9种本地字体 · 40+碑帖拓片动态加载 · 甲骨文 · 篆书 · 隶书 · 楷书 · 行书 · 草书</p>
    </div>

    <div class="container">
        <div class="controls">
            <h2>输入设置</h2>
            <div id="fontStatus" class="font-status font-loading">碑帖字体加载中...</div>
            <div class="form-row">
                <div class="form-group wide">
                    <label>输入要练习的文字（自动匹配碑帖原字）</label>
                    <textarea id="inputText" placeholder="请输入汉字，系统自动从碑帖中匹配">永和九年岁在癸丑</textarea>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>优先碑帖</label>
                    <select id="steleChoice">
                        <option value="auto" selected>自动匹配（所有来源）</option>
                        <optgroup label="── 按书体·动态拓片 ──">
                            <option value="style:隶书">隶书（15碑自动匹配）</option>
                            <option value="style:楷书">楷书（13碑自动匹配）</option>
                            <option value="style:行书">行书（6帖自动匹配）</option>
                            <option value="style:草书">草书（4帖自动匹配）</option>
                            <option value="style:篆书">篆书（4碑自动匹配）</option>
                        </optgroup>
                        <optgroup label="── 指定碑帖·隶书 ──">
                            <option value="rub:曹全碑">曹全碑</option>
                            <option value="rub:礼器碑">礼器碑</option>
                            <option value="rub:乙瑛碑">乙瑛碑</option>
                            <option value="rub:张迁碑">张迁碑</option>
                            <option value="rub:史晨碑">史晨碑</option>
                            <option value="rub:石门颂">石门颂</option>
                            <option value="rub:封龙山碑">封龙山碑</option>
                            <option value="rub:熹平石经">熹平石经</option>
                        </optgroup>
                        <optgroup label="── 指定碑帖·楷书 ──">
                            <option value="rub:多宝塔碑">颜真卿·多宝塔碑</option>
                            <option value="rub:颜勤礼碑">颜真卿·颜勤礼碑</option>
                            <option value="rub:玄秘塔碑">柳公权·玄秘塔碑</option>
                            <option value="rub:九成宫醴泉铭">欧阳询·九成宫</option>
                            <option value="rub:雁塔圣教序">褚遂良·雁塔圣教序</option>
                            <option value="rub:胆巴碑">赵孟頫·胆巴碑</option>
                        </optgroup>
                        <optgroup label="── 指定碑帖·行草 ──">
                            <option value="rub:兰亭序">王羲之·兰亭序</option>
                            <option value="rub:圣教序">怀仁集王·圣教序</option>
                            <option value="rub:寒食帖">苏轼·寒食帖</option>
                            <option value="rub:自叙帖">怀素·自叙帖</option>
                            <option value="rub:书谱">孙过庭·书谱</option>
                        </optgroup>
                        <optgroup label="── 指定碑帖·篆书 ──">
                            <option value="rub:石鼓文">石鼓文</option>
                            <option value="rub:泰山刻石">泰山刻石</option>
                            <option value="rub:峄山碑">峄山碑</option>
                        </optgroup>
                        <optgroup label="── 本地字体 ──">
                            <option value="caoguanbei">曹全碑 字体(602字)</option>
                            <option value="qiji">齐伋体 字体(5856字)</option>
                            <option value="shuowen">说文解字 字体(6738字)</option>
                            <option value="jiaguwen">甲骨文 字体(1312字)</option>
                            <option value="aoyagilishu">青柳隶书 字体(12204字)</option>
                            <option value="xuandongkai">玄冬楷书 字体(6775字)</option>
                            <option value="masafont">正风行书 字体(17615字)</option>
                            <option value="caoshu">流江草书 字体(6763字)</option>
                            <option value="bakudai">莫大毛笔 字体(18375字)</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label>格子类型</label>
                    <select id="gridType">
                        <option value="mi">米字格</option>
                        <option value="tian">田字格</option>
                        <option value="jiu">九宫格</option>
                        <option value="none">无格线</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>纸张格式</label>
                    <select id="paperFormat" onchange="applyPaperFormat()">
                        <optgroup label="四尺对开（常用练习纸）">
                            <option value="4x7:140" selected>28格 (4列×7行) · 标准练字</option>
                            <option value="4x6:160">24格 (4列×6行) · 稍大字</option>
                            <option value="3x5:180">15格 (3列×5行) · 大字练习</option>
                            <option value="2x4:220">8格 (2列×4行) · 特大字入门</option>
                            <option value="6x8:100">48格 (6列×8行) · 小楷</option>
                        </optgroup>
                        <optgroup label="四尺四开（小幅练习）">
                            <option value="4x4:140">16格 (4列×4行)</option>
                            <option value="3x4:160">12格 (3列×4行)</option>
                            <option value="2x3:200">6格 (2列×3行) · 大字</option>
                        </optgroup>
                        <optgroup label="考级/比赛">
                            <option value="4x7:140">考级标准 28格</option>
                        </optgroup>
                        <option value="custom">自定义...</option>
                    </select>
                </div>
            </div>
            <div class="form-row" id="customRow" style="display:none;">
                <div class="form-group">
                    <label>每行字数</label>
                    <select id="cols">
                        <option value="2">2字</option>
                        <option value="3">3字</option>
                        <option value="4" selected>4字</option>
                        <option value="5">5字</option>
                        <option value="6">6字</option>
                        <option value="8">8字</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>格子大小</label>
                    <select id="cellSize">
                        <option value="100">小 (小楷)</option>
                        <option value="140" selected>中 (标准)</option>
                        <option value="180">大</option>
                        <option value="220">特大</option>
                        <option value="260">超大</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>模式</label>
                    <select id="mode">
                        <option value="normal">正常（黑字）</option>
                        <option value="miaohong">描红（浅红）</option>
                        <option value="linmo">临摹（浅灰）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>排列方向</label>
                    <select id="direction">
                        <option value="horizontal">横排</option>
                        <option value="vertical">竖排</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group wide">
                    <label>快捷输入</label>
                    <div class="stele-select">
                        <span class="stele-tag" data-text="永和九年岁在癸丑暮春之初">兰亭序</span>
                        <span class="stele-tag" data-text="大道之行天下为公">礼运大同</span>
                        <span class="stele-tag" data-text="上善若水厚德载物">经典名句</span>
                        <span class="stele-tag" data-text="天行健君子以自强不息">周易</span>
                        <span class="stele-tag" data-text="曹全碑隶书字帖">曹全碑</span>
                        <span class="stele-tag" data-text="人之初性本善">三字经</span>
                    </div>
                </div>
            </div>
            <div class="coverage-info" id="coverageInfo"></div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="generatePreview()">生成预览</button>
                <button class="btn btn-secondary" onclick="downloadImage()">下载图片</button>
                <button class="btn btn-secondary" onclick="downloadPDF()">下载 PDF</button>
            </div>
        </div>

        <div class="preview-area">
            <h2>字帖预览</h2>
            <div class="preview-container" id="previewContainer">
                <div class="placeholder">输入文字后点击"生成预览"</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="strokes.html" style="color:#6b4226;text-decoration:none;font-weight:600;">笔画教学 →</a>
        <br><br>
        字跡 Selftrace · 甲骨文 · 篆书 · 隶书 · 楷书 · 行书 · 草书 · 毛笔 — 九种历史字体
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="./s2t.js"></script>
    <script src="./stele_chars.js"></script>

    <script>
        // ===== 字体配置 (按历史年代排序) =====
        const STELES = {
            jiaguwen:    { fontFamily: 'Jiaguwen',     name: '甲骨文',   period: '商代',  style: '甲骨文', file: './fonts/FangzhengJiaguwen.ttf', color: '#8b6508', bgColor: '#f5e6c8', loaded: false },
            shuowen:     { fontFamily: 'ShuowenJiezi', name: '说文解字', period: '东汉',  style: '小篆',   file: './fonts/ShuowenJiezi.ttf',      color: '#3a5a2c', bgColor: '#dde8d5', loaded: false },
            caoguanbei:  { fontFamily: 'CaoQuanBei',   name: '曹全碑',   period: '东汉',  style: '隶书',   file: './fonts/CaoQuanBei.ttf',        color: '#6b4226', bgColor: '#e8d5b5', loaded: false },
            aoyagilishu: { fontFamily: 'AoyagiLishu',  name: '青柳隶书', period: '当代',  style: '隶书',   file: './fonts/AoyagiLishu.ttf',       color: '#7a5230', bgColor: '#ede0d0', loaded: false },
            qiji:        { fontFamily: 'Qiji',         name: '齐伋体',   period: '明代',  style: '刻本',   file: './fonts/qiji.ttf',              color: '#2c4a5a', bgColor: '#d5e0e8', loaded: false },
            xuandongkai: { fontFamily: 'XuandongKai',  name: '玄冬楷书', period: '当代',  style: '楷书',   file: './fonts/XuandongKaishu.ttf',    color: '#4a3a6b', bgColor: '#e0d5e8', loaded: false },
            masafont:    { fontFamily: 'MasaFont',     name: '正风行书', period: '当代',  style: '行书',   file: './fonts/MasaFont-Regular.ttf',  color: '#2c5a4a', bgColor: '#d5e8e0', loaded: false },
            caoshu:      { fontFamily: 'Caoshu',       name: '流江草书', period: '当代',  style: '草书',   file: './fonts/ZhongqiLiujiangCaoshu.ttf', color: '#5a2c2c', bgColor: '#e8d5d5', loaded: false },
            bakudai:     { fontFamily: 'Bakudai',      name: '莫大毛笔', period: '当代',  style: '毛笔',   file: './fonts/Bakudai-Regular.ttf',   color: '#3a3a3a', bgColor: '#e0e0e0', loaded: false },
        };

        // Link char sets from stele_chars.js
        const CHAR_SETS = { JIAGUWEN_CHARS, SHUOWEN_CHARS, CAOGUANBEI_CHARS, AOYAGILISHU_CHARS, QIJI_CHARS, XUANDONGKAI_CHARS, MASAFONT_CHARS, CAOSHU_CHARS, BAKUDAI_CHARS };
        for (const key of Object.keys(STELES)) {
            const varName = key.toUpperCase() + '_CHARS';
            STELES[key].chars = CHAR_SETS[varName] || new Set();
        }

        // Auto-match priority: 碑帖复刻优先, 再按书体
        const AUTO_PRIORITY = ['caoguanbei', 'qiji', 'shuowen', 'jiaguwen', 'aoyagilishu', 'xuandongkai', 'masafont', 'caoshu', 'bakudai'];

        let canvas = null;

        // ===== 碑帖拓片图动态加载 =====
        // sfds.cn 动态采集，按书体分类
        const RUBBING_STELES_BY_STYLE = {
            隶书: [
                '曹全碑', '礼器碑', '乙瑛碑', '张迁碑', '史晨碑', '石门颂', '西狭颂', '华山庙碑',
                '封龙山碑', '孔宙碑', '鲜于璜碑', '衡方碑', '朝侯小子碑', '张景碑', '熹平石经',
            ],
            楷书: [
                '多宝塔碑', '颜勤礼碑', '祭侄文稿', '颜家庙碑',
                '玄秘塔碑', '神策军碑',
                '九成宫醴泉铭', '皇甫诞碑', '化度寺碑',
                '雁塔圣教序', '倪宽赞',
                '胆巴碑', '妙严寺记',
            ],
            行书: [
                '兰亭序', '圣教序', '中秋帖', '寒食帖', '蜀素帖', '苕溪诗帖',
            ],
            草书: [
                '自叙帖', '书谱', '十七帖', '古诗四帖',
            ],
            篆书: [
                '石鼓文', '泰山刻石', '峄山碑', '袁安碑',
            ],
        };
        // 平铺为搜索优先级列表（隶书优先）
        const RUBBING_STELES = Object.values(RUBBING_STELES_BY_STYLE).flat();
        const imageCache = {}; // char -> { stele, img, loaded }

        function getApiBase() {
            // Vercel: /api/stele-image, local dev: proxy needed
            if (location.hostname === 'localhost') return null; // skip on local
            return '/api/stele-image';
        }

        async function fetchRubbingImage(char, steleList) {
            const cacheKey = `${char}_${steleList ? steleList.join(',') : 'auto'}`;
            if (imageCache[cacheKey] !== undefined) return imageCache[cacheKey];

            const api = getApiBase();
            if (!api) return null;

            // Use provided list or default to all
            const steles = (steleList && steleList.length > 0)
                ? steleList
                : RUBBING_STELES;

            for (const stele of steles) {
                try {
                    const url = `${api}?char=${encodeURIComponent(char)}&stele=${encodeURIComponent(stele)}`;
                    const img = new Image();
                    img.crossOrigin = 'anonymous';

                    const loaded = await new Promise((resolve) => {
                        img.onload = () => resolve(true);
                        img.onerror = () => resolve(false);
                        img.src = url;
                    });

                    if (loaded && img.naturalWidth > 0) {
                        const result = { stele, img, loaded: true };
                        imageCache[cacheKey] = result;
                        return result;
                    }
                } catch (e) {
                    // continue to next stele
                }
            }

            imageCache[cacheKey] = null;
            return null;
        }

        // ===== 字体加载 =====
        async function loadAllFonts() {
            const statusEl = document.getElementById('fontStatus');
            const loaded = [];
            for (const [key, stele] of Object.entries(STELES)) {
                try {
                    const face = new FontFace(stele.fontFamily, `url(${stele.file})`);
                    await face.load();
                    document.fonts.add(face);
                    stele.loaded = true;
                    loaded.push(`${stele.name}(${stele.chars.size}字)`);
                } catch (e) {
                    console.warn(`${stele.name} load failed:`, e);
                }
            }
            if (loaded.length) {
                statusEl.textContent = `已加载: ${loaded.join(' / ')}`;
                statusEl.className = 'font-status font-loaded';
                generatePreview();
            } else {
                statusEl.textContent = '字体加载失败，请刷新';
                statusEl.className = 'font-status font-loading';
            }
        }

        // ===== 找出一个字应该用哪个碑帖 =====
        function isDynamicMode(preferred) {
            return preferred && (preferred.startsWith('rub:') || preferred.startsWith('style:'));
        }

        // 获取动态加载时要尝试的碑帖列表
        function getDynamicSteles(preferred) {
            if (preferred.startsWith('rub:')) {
                return [preferred.slice(4)]; // 指定碑帖
            }
            if (preferred.startsWith('style:')) {
                const style = preferred.slice(6);
                return RUBBING_STELES_BY_STYLE[style] || RUBBING_STELES;
            }
            return RUBBING_STELES; // auto fallback
        }

        function findSteleForChar(char, preferred) {
            // 动态模式: 跳过本地字体，全部走API
            if (isDynamicMode(preferred)) return null;

            // If preferred local stele is specified and has this char, use it
            if (preferred !== 'auto') {
                const stele = STELES[preferred];
                if (stele && stele.chars.has(char)) return preferred;
            }
            // Auto: try each in priority order
            for (const key of AUTO_PRIORITY) {
                if (STELES[key].chars.has(char)) return key;
            }
            return null;
        }

        // ===== 覆盖率检查 =====
        function checkCoverage(text, preferred) {
            const el = document.getElementById('coverageInfo');
            const chars = [...text].filter(c => c.trim());
            if (!chars.length) { el.style.display = 'none'; return; }

            const found = {};
            const missing = [];
            for (const c of chars) {
                const steleKey = findSteleForChar(c, preferred);
                if (steleKey) {
                    if (!found[steleKey]) found[steleKey] = [];
                    found[steleKey].push(c);
                } else {
                    missing.push(c);
                }
            }

            el.style.display = 'block';
            let html = '';
            const totalFound = Object.values(found).reduce((a, b) => a + b.length, 0);
            for (const [key, cs] of Object.entries(found)) {
                const stele = STELES[key];
                html += `<span style="background:${stele.bgColor};color:${stele.color};padding:2px 8px;border-radius:4px;margin-right:6px;">${stele.name}: ${cs.length}字</span>`;
            }
            if (missing.length) {
                html += `<br style="margin-top:6px"><span class="missing">暂无碑帖: ${missing.join('、')}（${missing.length}字）</span>`;
            } else {
                html = `<span class="found">全部 ${totalFound} 字已匹配碑帖</span><br>` + html;
            }
            if (totalFound > 0 && missing.length > 0) {
                html = `<span class="found">${totalFound} 字有碑帖原字</span>，` + html;
            }
            el.innerHTML = html;
        }

        // ===== 快捷输入 =====
        document.querySelectorAll('.stele-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.getElementById('inputText').value = tag.dataset.text;
                document.querySelectorAll('.stele-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                generatePreview();
            });
        });

        document.getElementById('steleChoice').addEventListener('change', () => generatePreview());

        // ===== 纸张格式预设 =====
        function applyPaperFormat() {
            const val = document.getElementById('paperFormat').value;
            const customRow = document.getElementById('customRow');
            if (val === 'custom') {
                customRow.style.display = 'flex';
                return;
            }
            customRow.style.display = 'none';
            // Parse format: "cols x rows : cellSize"
            const [grid, size] = val.split(':');
            const [cols] = grid.split('x');
            document.getElementById('cols').value = cols;
            document.getElementById('cellSize').value = size;
            generatePreview();
        }

        function getConfig() {
            // If using a preset, parse rows from format string
            const fmt = document.getElementById('paperFormat').value;
            let cols, cellSize, maxRows;
            if (fmt !== 'custom') {
                const [grid, size] = fmt.split(':');
                const parts = grid.split('x');
                cols = parseInt(parts[0]);
                cellSize = parseInt(size);
                maxRows = parseInt(parts[1]);
            } else {
                cols = parseInt(document.getElementById('cols').value);
                cellSize = parseInt(document.getElementById('cellSize').value);
                maxRows = null;
            }
            return {
                text: document.getElementById('inputText').value.replace(/\s+/g, ''),
                cols,
                cellSize,
                maxRows,
                gridType: document.getElementById('gridType').value,
                mode: document.getElementById('mode').value,
                direction: document.getElementById('direction').value,
                preferred: document.getElementById('steleChoice').value,
            };
        }

        const GRID_NAMES = { mi: '米字格', tian: '田字格', jiu: '九宫格', none: '无格线' };

        function drawGridCell(ctx, x, y, size, gridType) {
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, size, size);
            if (gridType === 'none') return;

            ctx.strokeStyle = '#ccc';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            const mid = size / 2;
            ctx.beginPath();
            if (gridType === 'mi') {
                ctx.moveTo(x+mid, y); ctx.lineTo(x+mid, y+size);
                ctx.moveTo(x, y+mid); ctx.lineTo(x+size, y+mid);
                ctx.moveTo(x, y); ctx.lineTo(x+size, y+size);
                ctx.moveTo(x+size, y); ctx.lineTo(x, y+size);
            } else if (gridType === 'tian') {
                ctx.moveTo(x+mid, y); ctx.lineTo(x+mid, y+size);
                ctx.moveTo(x, y+mid); ctx.lineTo(x+size, y+mid);
            } else if (gridType === 'jiu') {
                const t1 = size/3, t2 = size*2/3;
                ctx.moveTo(x+t1, y); ctx.lineTo(x+t1, y+size);
                ctx.moveTo(x+t2, y); ctx.lineTo(x+t2, y+size);
                ctx.moveTo(x, y+t1); ctx.lineTo(x+size, y+t1);
                ctx.moveTo(x, y+t2); ctx.lineTo(x+size, y+t2);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawMissingPlaceholder(ctx, x, y, cellSize, fontSize, char) {
            ctx.strokeStyle = '#e0d5c5';
            ctx.lineWidth = 1;
            ctx.setLineDash([]);
            const m = cellSize * 0.3;
            ctx.beginPath();
            ctx.moveTo(x+m, y+m); ctx.lineTo(x+cellSize-m, y+cellSize-m);
            ctx.moveTo(x+cellSize-m, y+m); ctx.lineTo(x+m, y+cellSize-m);
            ctx.stroke();

            ctx.font = `${Math.floor(fontSize * 0.3)}px -apple-system, "PingFang SC", sans-serif`;
            ctx.fillStyle = '#ccc';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(char, x + cellSize / 2, y + cellSize / 2);

            const api = getApiBase();
            ctx.font = '10px -apple-system, "PingFang SC", sans-serif';
            ctx.fillStyle = '#cc8866';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(api ? '加载中...' : '暂无碑帖', x + cellSize / 2, y + cellSize + 4);
        }

        function generatePreview() {
            const cfg = getConfig();
            if (!cfg.text) {
                document.getElementById('previewContainer').innerHTML = '<div class="placeholder">输入文字后点击"生成预览"</div>';
                return;
            }

            checkCoverage(cfg.text, cfg.preferred);

            const chars = [...cfg.text].filter(c => c.trim());
            let cols, rowCount;
            if (cfg.direction === 'vertical') {
                rowCount = cfg.maxRows || cfg.cols;
                cols = Math.ceil(chars.length / rowCount);
            } else {
                cols = cfg.cols;
                const minRows = Math.ceil(chars.length / cols);
                rowCount = cfg.maxRows ? Math.max(minRows, cfg.maxRows) : minRows;
            }

            const padding = 40;
            const titleHeight = 50;
            const sourceHeight = 22;
            const cellTotal = cfg.cellSize + sourceHeight;
            const width = cols * cfg.cellSize + padding * 2;
            const height = rowCount * cellTotal + padding * 2 + titleHeight;

            canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // 宣纸背景
            ctx.fillStyle = '#faf6ee';
            ctx.fillRect(0, 0, width, height);

            // 标题
            ctx.font = "22px 'CaoQuanBei', serif";
            ctx.fillStyle = '#5a3a28';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText(`碑帖字帖 · ${GRID_NAMES[cfg.gridType] || ''}`, padding, 36);

            const fontSize = Math.floor(cfg.cellSize * 0.75);

            chars.forEach((char, i) => {
                let row, col;
                if (cfg.direction === 'vertical') {
                    col = cols - 1 - Math.floor(i / cfg.cols);
                    row = i % cfg.cols;
                } else {
                    row = Math.floor(i / cfg.cols);
                    col = i % cfg.cols;
                }

                const x = padding + col * cfg.cellSize;
                const y = padding + titleHeight + row * cellTotal;

                drawGridCell(ctx, x, y, cfg.cellSize, cfg.gridType);

                const steleKey = findSteleForChar(char, cfg.preferred);

                if (steleKey) {
                    const stele = STELES[steleKey];

                    // 用碑帖字体渲染
                    ctx.font = `${fontSize}px '${stele.fontFamily}'`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    if (cfg.mode === 'normal') {
                        ctx.fillStyle = '#1a1008';
                    } else if (cfg.mode === 'miaohong') {
                        ctx.fillStyle = 'rgba(180, 40, 30, 0.20)';
                    } else if (cfg.mode === 'linmo') {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.10)';
                    }

                    ctx.fillText(char, x + cfg.cellSize / 2, y + cfg.cellSize / 2 + 2);

                    // 碑帖来源标注
                    ctx.font = '10px -apple-system, "PingFang SC", sans-serif';
                    ctx.fillStyle = stele.color;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'top';
                    ctx.fillText(stele.name, x + cfg.cellSize / 2, y + cfg.cellSize + 4);
                } else {
                    // 本地字体没有 -> 尝试动态加载碑帖拓片图
                    // 先画占位符，异步加载后更新
                    const cellX = x, cellY = y;
                    drawMissingPlaceholder(ctx, cellX, cellY, cfg.cellSize, fontSize, char);

                    // 异步: 尝试从API加载拓片
                    const dynamicSteles = isDynamicMode(cfg.preferred) ? getDynamicSteles(cfg.preferred) : null;
                    if (getApiBase()) {
                        (async () => {
                            const rubbing = await fetchRubbingImage(char, dynamicSteles);
                            if (rubbing && rubbing.img) {
                                // 重绘这个格子
                                const pad = Math.floor(cfg.cellSize * 0.08);
                                const drawSize = cfg.cellSize - pad * 2;

                                // 清除占位符区域
                                ctx.fillStyle = '#faf6ee';
                                ctx.fillRect(cellX + 1, cellY + 1, cfg.cellSize - 2, cfg.cellSize - 2);

                                // 重画格线
                                drawGridCell(ctx, cellX, cellY, cfg.cellSize, cfg.gridType);

                                // 绘制拓片图
                                if (cfg.mode === 'miaohong') {
                                    ctx.globalAlpha = 0.2;
                                } else if (cfg.mode === 'linmo') {
                                    ctx.globalAlpha = 0.1;
                                }
                                ctx.drawImage(rubbing.img, cellX + pad, cellY + pad, drawSize, drawSize);
                                ctx.globalAlpha = 1.0;

                                // 标注来源
                                ctx.font = '10px -apple-system, "PingFang SC", sans-serif';
                                ctx.fillStyle = '#6b4226';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'top';
                                ctx.fillText(rubbing.stele + '·拓', cellX + cfg.cellSize / 2, cellY + cfg.cellSize + 4);
                            }
                        })();
                    }

                }
            });

            // 空格子
            const totalCells = cols * rowCount;
            for (let i = chars.length; i < totalCells; i++) {
                let row, col;
                if (cfg.direction === 'vertical') {
                    col = cols - 1 - Math.floor(i / cfg.cols);
                    row = i % cfg.cols;
                } else {
                    row = Math.floor(i / cfg.cols);
                    col = i % cfg.cols;
                }
                const x = padding + col * cfg.cellSize;
                const y = padding + titleHeight + row * cellTotal;
                drawGridCell(ctx, x, y, cfg.cellSize, cfg.gridType);
            }

            document.getElementById('previewContainer').innerHTML = '';
            document.getElementById('previewContainer').appendChild(canvas);
        }

        function downloadImage() {
            if (!canvas) { alert('请先生成预览'); return; }
            const a = document.createElement('a');
            a.download = '碑帖字帖.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        }

        function downloadPDF() {
            if (!canvas) { alert('请先生成预览'); return; }
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
                unit: 'px', format: [canvas.width, canvas.height],
            });
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
            pdf.save('碑帖字帖.pdf');
        }

        document.getElementById('inputText').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generatePreview(); }
        });

        loadAllFonts();
    </script>
</body>
</html>
